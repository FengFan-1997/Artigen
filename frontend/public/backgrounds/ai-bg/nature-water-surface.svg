<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="rippleGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e0f7fa" stop-opacity="0.8"/>
      <stop offset="0.8" stop-color="#b2ebf2" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#80deea" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waterBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b2ebf2"/>
      <stop offset="1" stop-color="#4dd0e1"/>
    </linearGradient>
    <filter id="waterDistort">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.05" numOctaves="3" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#waterBase)" />
  
  <!-- Ripples -->
  <g filter="url(#waterDistort)">
    <circle cx="800" cy="450" r="100" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <circle cx="800" cy="450" r="150" fill="none" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <circle cx="800" cy="450" r="200" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <circle cx="800" cy="450" r="250" fill="none" stroke="#fff" stroke-width="2" opacity="0.2"/>
    <circle cx="200" cy="200" r="100" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <circle cx="1400" cy="700" r="150" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Highlight Glints -->
  <circle cx="850" cy="400" r="10" fill="#fff" opacity="0.8" filter="url(#waterDistort)"/>
  <circle cx="750" cy="500" r="5" fill="#fff" opacity="0.8" filter="url(#waterDistort)"/>
</svg>